# SPDX-License-Identifier: Apache-2.0

name: Rule Executer - Rule processor Automation

on:
  push:
    branches:
      - prod

jobs:
  automate-rule-executer:
    if: |
      github.actor != 'dependabot[bot]' && 
      github.actor != 'dependabot-preview[bot]' &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    runs-on:
    - tazama-uat
    env:
      RULE_NAME: ${{ github.event.repository.name }}

    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20 (GitHub Packages)
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      # Step 2: Clone Rule Executer Repo and delete package-lock.json file
      - name: Clone Rule Executer Repo
        run: |
          echo "Cloning Rule Executer repo and removing package-lock.json file..."
          git clone https://github.com/tazama-lf/rule-executer -b feat-paysys
          cd rule-executer 
          rm -f package-lock.json
          cd ..
          echo "Clone completed."
        env:
          GH_TOKEN: ${{ secrets.TAZAMA_TOKEN }}
      # Step 3: Duplicate Rule Executer Folder to 'rule-executer-$RULE_NAME'
      - name: Duplicate Rule Executer Folder
        run: |
          echo "Duplicating Rule Executer folder to rule-executer-$RULE_NAME..."
          cp -R rule-executer rule-executer-$RULE_NAME
          echo "Rule Executer folder duplicated."

      # Step 4: Update the version in package.json and rule number in Dockerfile
      # - name: Install jq
      #   run: dnf install -y jq
      - name: Normalize rule name
        run: |
          RULE_ID="${RULE_NAME#rule-}"
          echo "RULE_ID=$RULE_ID" >> $GITHUB_ENV
          echo "Normalized RULE_ID=$RULE_ID"

      - name: Modify Rule Executer Files
        run: |
          echo "Modifying rule-executer-$RULE_NAME files..."
          # Update rule dependency to use @latest
          sed -i 's|"rule": "npm:@psl-copilot/rule-placeholder@latest"|"rule": "npm:@psl-copilot/'"$RULE_NAME"'@latest"|g' rule-executer-$RULE_NAME/package.json

          # Update rule number in Dockerfile
          sed -i "s/placeholder/$RULE_ID/" rule-executer-$RULE_NAME/Dockerfile

          # Modify Dockerfile to accept GH_TOKEN and configure npm before npm ci
          sed -i '/^FROM node/a\ARG GH_TOKEN' rule-executer-$RULE_NAME/Dockerfile
          sed -i '/^RUN npm ci/i\RUN echo "@tazama-lf:registry=https://npm.pkg.github.com" > /root/.npmrc && \\\n    echo "@psl-copilot:registry=https://npm.pkg.github.com" >> /root/.npmrc && \\\n    echo "//npm.pkg.github.com/:_authToken=${GH_TOKEN}" >> /root/.npmrc\n' rule-executer-$RULE_NAME/Dockerfile
          echo "Successfully modified rule-executer-$RULE_NAME files."
          
      # Verify Changes in modified files
      - name: Verify Changes
        run: |
          cat rule-executer-$RULE_NAME/package.json
          cat rule-executer-$RULE_NAME/Dockerfile
      
      # Configure npm for GitHub Packages
      - name: Configure npm for GitHub Packages
        run: |
          export NPMRC_PATH="$HOME/.npmrc"
          echo "@tazama-lf:registry=https://npm.pkg.github.com" >  "$NPMRC_PATH"
          echo "@psl-copilot:registry=https://npm.pkg.github.com" >> "$NPMRC_PATH"
          echo "//npm.pkg.github.com/:_authToken=${GH_TOKEN}" >> "$NPMRC_PATH"

          echo "=== ACTIVE npmrc ==="
          cat "$NPMRC_PATH"
        env:
          GH_TOKEN: ${{ secrets.TAZAMA_TOKEN }}

      - name: Generate package-lock.json for Docker build
        run: |
          export NPM_CONFIG_USERCONFIG="$HOME/.npmrc"
          cd rule-executer-$RULE_NAME
          npm install --ignore-scripts --package-lock-only
        env:
          GH_TOKEN: ${{ secrets.TAZAMA_TOKEN }}

      - name: Install Latest Rule Version
        run: |
          cd rule-executer-$RULE_NAME
          npm pkg delete dependencies.rule
          npm install --save-exact rule@npm:@psl-copilot/$RULE_NAME@latest --ignore-scripts
          echo "✅ Installed: $(npm list rule --depth=0)"
        env:
          GH_TOKEN: ${{ secrets.TAZAMA_TOKEN }}

      - name: Extract Rule Version
        run: |
          cd rule-executer-$RULE_NAME
          RULE_VERSION=$(node -p "require('./node_modules/rule/package.json').version")
          echo "RULE_VERSION=$RULE_VERSION" >> $GITHUB_ENV
          echo "Detected RULE_VERSION=$RULE_VERSION"

      # Step 6: Build Docker Image and Deploy Container Locally
      - name: Build Docker Image and Deploy Container Locally
        run: |
          echo "Building Docker image locally on self-hosted runner..."
          docker build --build-arg GH_TOKEN=${GH_TOKEN} -t psl-copilot/$RULE_NAME:latest rule-executer-$RULE_NAME
          echo "Docker Image build complete."
          
          echo "Stopping and removing existing container if running..."
          docker stop $RULE_NAME || true
          docker rm $RULE_NAME || true
          
          echo "Deploying container on local server..."
          docker run -d --name $RULE_NAME \
          -e RULE_NAME=$RULE_ID \
          -e RULE_VERSION=1.0.0 \
          -e RAW_HISTORY_DATABASE=raw_history \
          -e RAW_HISTORY_DATABASE_HOST=10.10.80.37 \
          -e RAW_HISTORY_DATABASE_PORT=5432 \
          -e RAW_HISTORY_DATABASE_USER=postgres \
          -e RAW_HISTORY_DATABASE_PASSWORD=postgres \
          -e RAW_HISTORY_DATABASE_CERT_PATH=/usr/local/share/ca-certificates/ca-certificates.crt \
          -e CONFIGURATION_DATABASE=configuration \
          -e CONFIGURATION_DATABASE_HOST=10.10.80.37 \
          -e CONFIGURATION_DATABASE_PORT=5432 \
          -e CONFIGURATION_DATABASE_USER=postgres \
          -e CONFIGURATION_DATABASE_PASSWORD=postgres \
          -e CONFIGURATION_DATABASE_CERT_PATH=/usr/local/share/ca-certificates/ca-certificates.crt \
          -e EVENT_HISTORY_DATABASE=event_history \
          -e EVENT_HISTORY_DATABASE_HOST=10.10.80.37 \
          -e EVENT_HISTORY_DATABASE_PORT=5432 \
          -e EVENT_HISTORY_DATABASE_USER=postgres \
          -e EVENT_HISTORY_DATABASE_PASSWORD=postgres \
          -e EVENT_HISTORY_DATABASE_CERT_PATH=/usr/local/share/ca-certificates/ca-certificates.crt \
          -e STARTUP_TYPE=nats \
          -e SERVER_URL=10.10.80.37:14222 \
          -e PRODUCER_STREAM= \
          -e CONSUMER_STREAM= \
          -e STREAM_SUBJECT= \
          -e ACK_POLICY=Explicit \
          -e PRODUCER_STORAGE=File \
          -e PRODUCER_RETENTION_POLICY=Workqueue \
          --restart unless-stopped psl-copilot/$RULE_NAME:latest
          
          echo "Container deployed successfully."
        env:
          GH_TOKEN: ${{ secrets.TAZAMA_TOKEN }}
